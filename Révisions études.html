<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Réviz' — du CM2 à la Terminale</title>
<style>
  :root{
    --bg:#0f1220;--bg2:#171b30;--card:#1d2238;--card2:#232a45;
    --txt:#e8ebf7;--muted:#9aa3c4;--line:#2c3358;
    --accent:#6c8cff;--accent2:#8f6cff;--good:#34d399;--warn:#fbbf24;--bad:#f87171;
    --shadow:0 10px 30px rgba(0,0,0,.35);--radius:16px;
  }
  [data-theme="light"]{
    --bg:#eef1fb;--bg2:#fff;--card:#fff;--card2:#f4f6ff;--txt:#1a1e33;--muted:#5b6486;--line:#e1e6f5;
    --accent:#4361ee;--accent2:#7048e8;--good:#10b981;--warn:#d97706;--bad:#ef4444;--shadow:0 10px 30px rgba(60,70,120,.12);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;background:linear-gradient(160deg,var(--bg),var(--bg2));color:var(--txt);min-height:100vh}
  .wrap{max-width:1000px;margin:0 auto;padding:18px 18px 90px}
  header.top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 0 10px}
  .logo{width:46px;height:46px;border-radius:14px;flex:0 0 auto;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;font-size:24px;box-shadow:var(--shadow)}
  h1{font-size:1.25rem;margin:0;font-weight:800}
  .sub{color:var(--muted);font-size:.82rem;margin-top:2px}
  .spacer{flex:1}
  .chip{display:inline-flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 12px;font-weight:700;font-size:.85rem}
  .chip.xp{color:var(--warn)}.chip.streak{color:#fb7185}
  .iconbtn{background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:9px 12px;cursor:pointer;font-size:.9rem}
  select,input,textarea{background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:11px 12px;font-size:.95rem;font-family:inherit;outline:none;width:100%}
  select:focus,input:focus,textarea:focus{border-color:var(--accent)}
  label{font-size:.8rem;color:var(--muted);display:block;margin:0 0 6px 2px}
  textarea{min-height:120px;resize:vertical;line-height:1.5}
  /* selecteurs matiere/niveau */
  .pickbar{display:flex;gap:10px;flex-wrap:wrap;margin:6px 0 14px}
  .subjects{display:flex;gap:8px;overflow:auto;padding:4px 0}
  .subjbtn{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:14px;padding:10px 14px;cursor:pointer;font-weight:600;font-size:.8rem;transition:.15s;min-width:84px}
  .subjbtn .si{font-size:1.5rem}
  .subjbtn:hover{border-color:var(--accent)}
  .subjbtn.on{color:#fff;border:0}
  nav.tabs{display:flex;gap:6px;background:var(--card);padding:6px;border-radius:14px;border:1px solid var(--line);margin:6px 0 18px;overflow:auto}
  nav.tabs button{flex:1;min-width:96px;border:0;background:transparent;color:var(--muted);padding:11px 8px;border-radius:10px;cursor:pointer;font-size:.88rem;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px;transition:.15s}
  nav.tabs button .ic{font-size:1.1rem}
  nav.tabs button.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:var(--shadow)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:16px}
  .row{display:flex;gap:12px;flex-wrap:wrap}.row>*{flex:1;min-width:140px}
  .btn{border:0;border-radius:12px;padding:12px 16px;cursor:pointer;font-weight:700;font-size:.95rem;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;transition:.15s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
  .btn:hover{transform:translateY(-1px);filter:brightness(1.05)}
  .btn.ghost{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
  .btn.good{background:linear-gradient(135deg,#10b981,#059669)}
  .btn.sm{padding:8px 12px;font-size:.85rem}
  .btn.bad{background:linear-gradient(135deg,#ef4444,#dc2626)}
  .muted{color:var(--muted)}.small{font-size:.82rem}.center{text-align:center}.hidden{display:none!important}
  .lessonrow{display:flex;align-items:center;gap:12px;background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:.15s}
  .lessonrow:hover{border-color:var(--accent);transform:translateX(2px)}
  .lessonrow .ln{flex:1;font-weight:700}
  .lessonrow .lm{color:var(--muted);font-size:.78rem;font-weight:500;margin-top:2px}
  .lessonrow .lbar{width:70px;height:7px;border-radius:999px;background:var(--card);border:1px solid var(--line);overflow:hidden;flex:0 0 auto}
  .lessonrow .lbar>div{height:100%;background:linear-gradient(90deg,var(--good),#34d399)}
  .cours{line-height:1.62;white-space:pre-wrap}
  .cours b{color:var(--accent)}
  .retenir{background:var(--card2);border:1px solid var(--line);border-left:4px solid var(--warn);border-radius:10px;padding:12px 14px;margin:12px 0;line-height:1.6}
  .retenir .ri{padding:5px 0;border-bottom:1px dashed var(--line)}
  .retenir .ri:last-child{border:0}
  .retenir b{color:var(--warn)}
  .opt{display:block;width:100%;text-align:left;background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:13px;margin-bottom:9px;cursor:pointer;font-size:1rem;transition:.15s}
  .opt:hover{border-color:var(--accent)}
  .opt.correct{background:rgba(16,185,129,.18);border-color:var(--good)}
  .opt.wrong{background:rgba(239,68,68,.16);border-color:var(--bad)}
  .exo{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
  .exo .q{font-weight:700;margin-bottom:10px;line-height:1.5}
  .exo .tag{display:inline-block;font-size:.66rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;border-radius:999px;padding:2px 8px;margin-bottom:8px}
  .tag.qcm{background:rgba(108,140,255,.2);color:var(--accent)}
  .tag.saisie{background:rgba(52,211,153,.2);color:var(--good)}
  .tag.open{background:rgba(251,191,36,.2);color:var(--warn)}
  .fb{margin-top:10px;font-size:.92rem;line-height:1.5}
  .fb.ok{color:var(--good)}.fb.no{color:var(--bad)}
  .corrige{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:10px;line-height:1.55;white-space:pre-wrap}
  .stat{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center}
  .stat .n{font-size:1.8rem;font-weight:800;color:var(--accent)}
  .stat .l{color:var(--muted);font-size:.8rem;margin-top:4px}
  .gtiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .progress{height:8px;background:var(--card2);border-radius:999px;overflow:hidden;border:1px solid var(--line)}
  .progress>div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:.3s}
  .flash{min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:20px;padding:28px 20px;cursor:pointer;text-align:center}
  .flash .term{font-size:1.6rem;font-weight:800;line-height:1.35}
  .flash .ans{font-size:1.4rem;font-weight:700;color:var(--accent);margin-top:10px}
  .flash .hint{color:var(--muted);font-size:.82rem;margin-top:16px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--line);color:var(--txt);padding:12px 18px;border-radius:12px;box-shadow:var(--shadow);opacity:0;transition:.25s;z-index:50;max-width:92%}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .note20{font-size:2rem;font-weight:800}
  .breadcrumb{color:var(--muted);font-size:.82rem;margin-bottom:6px;cursor:pointer}
  .breadcrumb:hover{color:var(--accent)}
  a{color:var(--accent)}
  /* Pavé de symboles (saisie maths/sciences) */
  .keypad{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .keycap{min-width:40px;min-height:40px;background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:9px;font-size:1.05rem;cursor:pointer;font-family:inherit}
  .keycap:hover{border-color:var(--accent)}
  .keycap:active{background:var(--card2)}
  /* Tactile / multi-appareils : cibles confortables, pas de surbrillance bleue */
  button,select,input,textarea,.opt,.lessonrow,.subjbtn,.keycap{-webkit-tap-highlight-color:transparent}
  button,.opt,.lessonrow,.subjbtn,.keycap,nav.tabs button{touch-action:manipulation}
  .btn,.opt,.lessonrow{min-height:44px}
  input,textarea,select{font-size:16px}  /* >=16px : évite le zoom auto sur iOS */
  /* Compte à rebours d'examen */
  .countdown{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:0}
  .countdown .big{font-size:1.6rem;font-weight:800}
  /* Responsive : tablette */
  @media(max-width:820px){ .wrap{padding:14px 12px 84px} }
  /* Responsive : smartphone */
  @media(max-width:560px){
    .wrap{padding:12px 10px 84px}
    h1{font-size:1.1rem}
    .flash .term{font-size:1.3rem}
    nav.tabs button{min-width:74px;font-size:.78rem;padding:10px 6px}
    nav.tabs button .ic{font-size:1.25rem}
    .subjbtn{min-width:76px;padding:9px 10px}
    .stat .n{font-size:1.5rem}
    .card{padding:14px}
    .row>*{min-width:120px}
    .note20{font-size:1.7rem}
    .keycap{min-width:44px;min-height:44px;flex:1}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="logo">🎓</div>
    <div>
      <h1>Réviz'</h1>
      <div class="sub">Apprendre, s'entraîner & s'évaluer — du CM2 à la Terminale</div>
    </div>
    <div class="spacer"></div>
    <span class="chip streak" id="hudStreak" title="Jours consécutifs">🔥 0</span>
    <span class="chip xp" id="hudXp" title="Points">⭐ 0</span>
    <button class="iconbtn" id="themeBtn" title="Thème">🌙</button>
  </header>

  <div class="subjects" id="subjects"></div>
  <div class="pickbar">
    <div style="max-width:220px"><label>Niveau</label><select id="levelSel"></select></div>
    <div style="flex:1;display:flex;align-items:flex-end"><div class="muted small" id="pickInfo"></div></div>
  </div>

  <nav class="tabs" id="tabs">
    <button data-view="lessons" class="active"><span class="ic">📚</span>Leçons</button>
    <button data-view="train"><span class="ic">🎯</span>S'entraîner</button>
    <button data-view="exam"><span class="ic">📝</span>Évaluation</button>
    <button data-view="progress"><span class="ic">📈</span>Progrès</button>
    <button data-view="settings"><span class="ic">⚙️</span>Réglages</button>
  </nav>

  <section id="view-lessons"></section>
  <section id="view-train" class="hidden"></section>
  <section id="view-exam" class="hidden"></section>
  <section id="view-progress" class="hidden"></section>
  <section id="view-settings" class="hidden"></section>
</div>
<div class="toast" id="toast"></div>

<script src="cours.js"></script>
<script>
"use strict";
/* ============================ Données : programme ============================ */
const LEVELS=["CE1","CE2","CM1","CM2","6e","5e","4e","3e","2nde","1ère","Terminale"];
const SUBJECTS=[
 {id:"fr",name:"Français",icon:"📖",color:"linear-gradient(135deg,#6c8cff,#8f6cff)"},
 {id:"math",name:"Mathématiques",icon:"📐",color:"linear-gradient(135deg,#f59e0b,#ef4444)"},
 {id:"hist",name:"Histoire",icon:"🏛️",color:"linear-gradient(135deg,#b45309,#92400e)"},
 {id:"geo",name:"Géographie",icon:"🌍",color:"linear-gradient(135deg,#10b981,#059669)"},
 {id:"phys",name:"Physique",icon:"⚛️",color:"linear-gradient(135deg,#3b82f6,#1d4ed8)"},
 {id:"chim",name:"Chimie",icon:"🧪",color:"linear-gradient(135deg,#8b5cf6,#6d28d9)"},
 {id:"svt",name:"SVT",icon:"🧬",color:"linear-gradient(135deg,#22c55e,#15803d)"}
];
/* Chaque leçon : {id,t,cours,retenir:[[recto,verso]],exos:[{t:'qcm'|'saisie'|'open',...}]} */
const SEED_CURRICULUM={
 math:{
  "CM2":[
   {id:"math_cm2_frac",t:"Les fractions",
    cours:"Une <b>fraction</b> représente une ou plusieurs parts d'un tout partagé en parts égales.\nDans a/b : <b>b</b> (dénominateur) = nombre de parts égales ; <b>a</b> (numérateur) = nombre de parts prises.\n\n• Fraction d'une quantité : « les 3/4 de 20 » = 20 ÷ 4 × 3 = 15.\n• Fractions égales : on multiplie (ou divise) numérateur ET dénominateur par le même nombre. Ex : 1/2 = 2/4 = 50/100.\n• Comparer : si même dénominateur, la plus grande fraction est celle qui a le plus grand numérateur.",
    retenir:[["Fraction de N (a/b de N)","N ÷ b × a"],["1/2 = … /4 = … /100","2/4 = 50/100"],["Demi, quart, dixième","1/2, 1/4, 1/10"]],
    exos:[
     {t:"qcm",q:"Que valent les 3/4 de 20 ?",opts:["12","15","16","5"],a:1,ex:"20 ÷ 4 = 5, puis 5 × 3 = 15."},
     {t:"qcm",q:"Quelle fraction est égale à 1/2 ?",opts:["2/3","3/5","4/8","1/4"],a:2,ex:"4/8 : on a multiplié 1 et 2 par 4."},
     {t:"saisie",q:"Écris en chiffres : un quart (sous la forme a/b).",a:["1/4"],ex:"Un quart = 1/4."},
     {t:"saisie",q:"Combien valent les 2/5 de 30 ?",a:["12"],ex:"30 ÷ 5 = 6, puis 6 × 2 = 12."}
    ]}
  ],
  "3e":[
   {id:"math_3e_pyth",t:"Théorème de Pythagore",
    cours:"Dans un <b>triangle rectangle</b>, le carré de l'hypoténuse (le plus grand côté, opposé à l'angle droit) est égal à la somme des carrés des deux autres côtés.\n\nSi le triangle ABC est rectangle en A : <b>BC² = AB² + AC²</b>.\n\n• Calculer une longueur : on isole le côté cherché puis on prend la racine carrée.\n• Réciproque : si BC² = AB² + AC², alors le triangle est rectangle en A (sert à prouver l'angle droit).",
    retenir:[["Théorème de Pythagore (rectangle en A)","BC² = AB² + AC²"],["Hypoténuse","côté le plus long, opposé à l'angle droit"],["Réciproque","si BC²=AB²+AC² alors rectangle en A"]],
    exos:[
     {t:"qcm",q:"Triangle rectangle en A, AB=3, AC=4. Que vaut BC ?",opts:["5","6","7","25"],a:0,ex:"BC²=3²+4²=9+16=25, donc BC=√25=5."},
     {t:"saisie",q:"Rectangle en A, AB=6, AC=8. Donne BC.",a:["10"],ex:"BC²=36+64=100, BC=10."},
     {t:"qcm",q:"BC=13, AB=5. Le triangle est rectangle en A. Que vaut AC ?",opts:["12","8","18","144"],a:0,ex:"AC²=BC²−AB²=169−25=144, AC=12."}
    ]},
   {id:"math_3e_ident",t:"Les identités remarquables",
    cours:"Trois égalités à connaître par cœur pour développer ou factoriser :\n\n<b>(a+b)² = a² + 2ab + b²</b>\n<b>(a−b)² = a² − 2ab + b²</b>\n<b>(a+b)(a−b) = a² − b²</b>\n\n• Développer = enlever les parenthèses (gauche → droite).\n• Factoriser = mettre en facteur (droite → gauche), très utile pour résoudre des équations.",
    retenir:[["(a+b)²","a² + 2ab + b²"],["(a−b)²","a² − 2ab + b²"],["(a+b)(a−b)","a² − b²"]],
    exos:[
     {t:"qcm",q:"Développer (x+3)² :",opts:["x²+9","x²+6x+9","x²+3x+9","x²+6x+3"],a:1,ex:"(x+3)²=x²+2·x·3+3²=x²+6x+9."},
     {t:"saisie",q:"Factorise x²−25 sous la forme (a+b)(a−b). Écris-le (avec x).",a:["(x+5)(x-5)","(x-5)(x+5)"],ex:"x²−25=x²−5²=(x+5)(x−5)."},
     {t:"qcm",q:"Développer (x−4)² :",opts:["x²−16","x²−8x+16","x²+8x+16","x²−8x−16"],a:1,ex:"(x−4)²=x²−8x+16."}
    ]}
  ],
  "Terminale":[
   {id:"math_term_deriv",t:"Dérivées (rappels et applications)",
    cours:"La <b>dérivée</b> f′ d'une fonction f donne, en chaque point, le coefficient directeur de la tangente — donc le sens de variation.\n\nDérivées usuelles : (xⁿ)′ = n·xⁿ⁻¹ ; (1/x)′ = −1/x² ; (√x)′ = 1/(2√x) ; (eˣ)′ = eˣ ; (ln x)′ = 1/x.\nOpérations : (u+v)′ = u′+v′ ; (k·u)′ = k·u′ ; (uv)′ = u′v + uv′ ; (u/v)′ = (u′v − uv′)/v².\n\n<b>Étude des variations</b> : on calcule f′(x), on étudie son signe ; f croît là où f′>0, décroît là où f′<0. Un extremum local s'obtient là où f′ s'annule en changeant de signe.",
    retenir:[["(xⁿ)′","n·xⁿ⁻¹"],["(eˣ)′","eˣ"],["(ln x)′","1/x"],["(uv)′","u′v + uv′"],["(u/v)′","(u′v − uv′)/v²"],["f croissante quand","f′(x) > 0"]],
    exos:[
     {t:"qcm",q:"Dérivée de f(x)=x³ :",opts:["3x²","x²","3x","x⁴/4"],a:0,ex:"(xⁿ)′=n·xⁿ⁻¹, donc 3x²."},
     {t:"saisie",q:"Dérivée de f(x)=2x²+5x (écris f'(x)).",a:["4x+5"],ex:"f′(x)=4x+5."},
     {t:"open",q:"Soit f(x)=x³−3x. Étudie le sens de variation de f sur ℝ et précise ses extremums locaux. Rédige le raisonnement complet.",
      expected:"f′(x)=3x²−3=3(x−1)(x+1). f′>0 pour x<−1 et x>1 (f croissante), f′<0 pour −1<x<1 (f décroissante). Maximum local en x=−1 (f(−1)=2), minimum local en x=1 (f(1)=−2). Tableau de variations attendu, signe de f′ justifié."}
    ]}
  ]
 },
 fr:{
  "CM2":[
   {id:"fr_cm2_accord",t:"Les accords (sujet-verbe et dans le groupe nominal)",
    cours:"<b>Accord sujet-verbe</b> : le verbe s'accorde en personne et en nombre avec son sujet. On trouve le sujet en posant « Qui est-ce qui … ? ».\nEx : « Les enfants <b>jouent</b> » (sujet pluriel → verbe en -nt).\n\n<b>Accord dans le groupe nominal</b> : le déterminant et l'adjectif s'accordent en genre (masculin/féminin) et en nombre (singulier/pluriel) avec le nom.\nEx : « une grande maison » → « des grandes maisons ».\n\nAttention : le sujet peut être éloigné du verbe ou inversé. « Dans le jardin <b>chantent</b> les oiseaux » (sujet = les oiseaux).",
    retenir:[["Trouver le sujet","« Qui est-ce qui + verbe ? »"],["Verbe, 3e pers. du pluriel","souvent -ent (ils jouent)"],["Adjectif","s'accorde en genre et en nombre avec le nom"]],
    exos:[
     {t:"qcm",q:"« Les chats … sur le mur. » Choisis la bonne forme.",opts:["dort","dorment","dormes","dormons"],a:1,ex:"Sujet pluriel (les chats) → dorment."},
     {t:"saisie",q:"Mets au pluriel : « un beau jardin ». (écris le groupe complet)",a:["de beaux jardins","des beaux jardins"],ex:"Au pluriel : « de beaux jardins » (beau → beaux)."},
     {t:"qcm",q:"« Dans la forêt … les oiseaux. » Quel verbe ?",opts:["chante","chantent","chantons","chantez"],a:1,ex:"Sujet inversé = les oiseaux (pluriel) → chantent."}
    ]}
  ],
  "3e":[
   {id:"fr_3e_figures",t:"Les figures de style",
    cours:"Les figures de style créent des effets et enrichissent le sens.\n\n• <b>Comparaison</b> : rapproche deux éléments avec un outil (comme, tel, ainsi que). « Fort comme un lion ».\n• <b>Métaphore</b> : comparaison sans outil. « Cet homme est un lion ».\n• <b>Personnification</b> : prête des traits humains à une chose. « Le vent murmure ».\n• <b>Hyperbole</b> : exagération. « Mourir de faim ».\n• <b>Anaphore</b> : répétition d'un mot en début de phrases/vers.\n• <b>Métonymie</b> : désigne par un élément lié (« boire un verre »).\n• <b>Antithèse</b> : oppose deux termes. « Ici tout n'est qu'ordre et beauté ».",
    retenir:[["Comparaison","outil de comparaison (comme, tel…)"],["Métaphore","comparaison SANS outil"],["Personnification","traits humains à une chose"],["Hyperbole","exagération"],["Anaphore","répétition en début de phrase/vers"]],

function normExo(e){
  const o={t:e.t,q:e.q,notion:e.notion||""};
  if(e.t==="qcm"){ o.opts=e.opts||[]; o.a=(typeof e.correct==="number"?e.correct:(typeof e.a==="number"?e.a:0)); o.ex=e.ex||""; }
  else if(e.t==="saisie"){ o.a=e.answers||e.a||[]; o.ex=e.ex||""; }
  else if(e.t==="dictee"){ o.text=e.text||""; o.ex=e.ex||""; }
  else { o.expected=e.expected||""; }
  return o;
}
function buildCurriculum(cells){
  const C={};
  cells.forEach(cell=>{
    if(!cell||!cell.subject||!cell.level||!cell.lessons)return;
    const arr=(C[cell.subject]=C[cell.subject]||{})[cell.level]=[];
    cell.lessons.forEach((les,i)=>{
      arr.push({ id:cell.subject+"_"+cell.level.replace(/[^a-z0-9]/gi,"")+"_"+i,
        t:les.t||"Leçon", cours:les.cours||"", methodo:les.methodo||"",
        retenir:(les.retenir||[]).filter(r=>Array.isArray(r)&&r.length>=2),
        exos:(les.exos||[]).map(normExo) });
    });
  });
  return C;
}
function mergeCurriculum(seed,cells){
  const C={}; for(const s in seed){ C[s]={}; for(const lv in seed[s]) C[s][lv]=seed[s][lv].slice(); }
  if(cells&&cells.length){ const gen=buildCurriculum(cells); for(const s in gen){ C[s]=C[s]||{}; for(const lv in gen[s]) C[s][lv]=gen[s][lv]; } } // le généré complète/remplace par (matière,niveau)
  return C;
}

function exoSrs(id){ return data.exoSrs[id]||(data.exoSrs[id]={ease:2.5,interval:0,due:0,reps:0,lapses:0}); }
function scheduleExo(id,ok){ if(!data.exoSrs)data.exoSrs={}; const s=exoSrs(id), t=todayNum();
  if(!ok){ s.reps=0; s.interval=0; s.lapses=(s.lapses||0)+1; s.due=t; }
  else { s.reps=(s.reps||0)+1; s.ease=Math.min(2.8,Math.max(1.3,s.ease+0.05)); s.interval = s.reps===1?1:(s.reps===2?3:Math.round((s.interval||1)*s.ease)); s.due=t+s.interval; } }

function masteryStats(subjectFilter){
  let seen=0,wrong=0;
  Object.values(data.notions||{}).forEach(n=>{ if(!subjectFilter||n.subject===subjectFilter){ seen+=(n.seen||0); wrong+=(n.wrong||0); } });
  const acc=seen?(seen-wrong)/seen:0;
  let bestSum=0,bestCount=0;
  for(const s in CURRICULUM){ if(subjectFilter&&s!==subjectFilter)continue; for(const lv in CURRICULUM[s])CURRICULUM[s][lv].forEach(les=>{const p=data.prog[les.id];if(p&&p.best){bestSum+=p.best;bestCount++;}}); }
  const noteScore=bestCount?(bestSum/bestCount)/20:0;
  let mastery;
  if(seen<3&&bestCount===0) mastery=null;
  else if(bestCount===0) mastery=Math.round(acc*100);
  else if(seen<3) mastery=Math.round(noteScore*100);
  else mastery=Math.round((acc*0.6+noteScore*0.4)*100);
  return {mastery,seen,acc:Math.round(acc*100),avg:bestCount?Math.round(bestSum/bestCount):null};
}

/* ---- Dictée : synthèse vocale + correction mot à mot ---- */
function speakFr(text,rate){
  try{
    if(!("speechSynthesis" in window)){ toast("La lecture audio n'est pas disponible sur ce navigateur."); return; }
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text); u.lang="fr-FR"; u.rate=rate||1;
    const vs=speechSynthesis.getVoices(); const v=vs.find(x=>/fr[-_]?FR/i.test(x.lang))||vs.find(x=>/^fr/i.test(x.lang)); if(v)u.voice=v;
    speechSynthesis.speak(u);
  }catch(e){ toast("Lecture audio impossible."); }
}
function dnorm(w){ return String(w).toLowerCase().normalize("NFC").replace(/[.,;:!?«»"'()’]/g,"").trim(); }
function dicteeCompare(student,correct){
  const cs=String(correct).trim().split(/\s+/).filter(Boolean), ss=String(student).trim().split(/\s+/).filter(Boolean);
  const n=cs.length,m=ss.length; const dp=Array.from({length:n+1},()=>new Array(m+1).fill(0));
  for(let a=n-1;a>=0;a--)for(let b=m-1;b>=0;b--){ dp[a][b]= dnorm(cs[a])===dnorm(ss[b]) ? dp[a+1][b+1]+1 : Math.max(dp[a+1][b],dp[a][b+1]); }
  const matched=new Array(n).fill(false); let a=0,b=0;
  while(a<n&&b<m){ if(dnorm(cs[a])===dnorm(ss[b])){matched[a]=true;a++;b++;} else if(dp[a+1][b]>=dp[a][b+1])a++; else b++; }
  const correctCount=matched.filter(Boolean).length;
  const html=cs.map((w,idx)=>matched[idx]?`<span style="color:var(--good)">${esc(w)}</span>`:`<span style="color:var(--bad);text-decoration:underline">${esc(w)}</span>`).join(" ");
  return {correct:correctCount,total:n,score:n?correctCount/n:0,html};
}

function buildEvalPrompt(ex,answer){
  const subj=SUBJECTS.find(s=>s.id===curSubject).name;
  return `Tu es un professeur de ${subj} très expérimenté du système scolaire français. Tu corriges la copie d'un élève de niveau ${curLevel} avec exigence ET bienveillance, en valorisant l'esprit critique, l'analyse et la qualité de la rédaction.
QUESTION : ${ex.q}
ÉLÉMENTS DE CORRECTION ATTENDUS : ${ex.expected||"(à apprécier selon le niveau)"}
RÉPONSE DE L'ÉLÈVE : """${answer}"""
Corrige la copie. Commence IMPÉRATIVEMENT par une première ligne au format exact : NOTE: X/20
Puis fournis :
✅ Points forts (concrets, en citant la copie)
⚠️ À améliorer (précis)
✍️ Conseil de méthode / rédaction
Une phrase d'encouragement finale. Reste adapté au niveau ${curLevel}.`;
}
async function geminiGenerate(prompt){
  const key=effectiveGeminiKey();
  const model=data.settings.geminiModel||"gemini-2.5-flash";
  if(!key)throw new Error("NO_KEY");
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(key)}`;
  const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
  if(!r.ok){const t=await r.text();throw new Error("HTTP "+r.status+" — "+t.slice(0,160));}
  const j=await r.json();
  const txt=j&&j.candidates&&j.candidates[0]&&j.candidates[0].content&&j.candidates[0].content.parts&&j.candidates[0].content.parts[0].text;
  if(!txt)throw new Error("Réponse vide de l'IA");
  return txt;
}
async function evaluateOpen(ex,answer,fb,btn){
  if(!answer||answer.trim().length<5){fb.className="fb no";fb.textContent="Écris d'abord une réponse un peu développée.";return;}
  const hasKey=!!effectiveGeminiKey();
  if(hasKey){
    fb.className="fb";fb.innerHTML='<span class="muted">🧠 Correction par l\'IA en cours…</span>';btn.disabled=true;
    try{
      const out=await geminiGenerate(buildEvalPrompt(ex,answer));
      const m=out.match(/NOTE\s*:\s*(\d{1,2})\s*\/\s*20/i);
      let head="";if(m){const note=parseInt(m[1],10);head=`<div class="note20" style="color:${note>=10?'var(--good)':'var(--warn)'}">${note}/20</div>`;recordOpenScore(note);}
      fb.className="fb";fb.innerHTML=head+`<div class="corrige">${esc(out.replace(/^NOTE\s*:\s*\d{1,2}\s*\/\s*20\s*/i,"")).replace(/\n/g,"<br>")}</div>`;
    }catch(e){
      const msg=String(e.message||e);
      fb.className="fb no";
      fb.innerHTML=(msg==="NO_KEY"?"":`⚠ ${esc(msg)}<br>`)+showCorrige(ex);
      bindSelfEval(ex,fb);
    }
    btn.disabled=false;
  } else {
    fb.className="fb";
    fb.innerHTML=`<div class="muted small">Pas de clé IA configurée — voici les <b>éléments de correction</b> pour t'auto-évaluer (active l'IA dans ⚙️ Réglages pour une vraie note).</div>`+showCorrige(ex);
    bindSelfEval(ex,fb);
  }
}
function showCorrige(ex){return `<div class="corrige"><b>📋 Éléments attendus :</b><br>${esc(ex.expected||"").replace(/\n/g,"<br>")}</div><div class="small muted" style="margin-top:8px">Auto-évalue ta réponse :</div><div class="row" id="selfeval" style="margin-top:6px"></div>`;}
function bindSelfEval(ex,fb){
  const box=fb.querySelector("#selfeval");if(!box)return;

function gradeTrain(q){
  const c=trainCards[trainIdx];const s=srs(c.key);const t=todayNum();

}

function renderProgress(){
  const root=document.getElementById("view-progress");root.innerHTML="";
  let totalLessons=0,started=0,bestSum=0,bestCount=0;
  SUBJECTS.forEach(s=>{for(const l in CURRICULUM[s.id])CURRICULUM[s.id][l].forEach(les=>{totalLessons++;const p=data.prog[les.id];if(p&&(p.done||p.best)){started++;}if(p&&p.best){bestSum+=p.best;bestCount++;}});});
  const head=document.createElement("div");head.className="card";head.innerHTML=`<h2 style="margin-top:0">📈 Ta progression</h2>
   <div class="gtiles"><div class="stat"><div class="n" style="color:var(--warn)">${data.game.xp||0}</div><div class="l">⭐ Points</div></div>
   <div class="stat"><div class="n" style="color:#fb7185">${data.game.streak||0}</div><div class="l">🔥 Jours de suite</div></div>
   <div class="stat"><div class="n">${started}/${totalLessons}</div><div class="l">Leçons abordées</div></div>
   <div class="stat"><div class="n" style="color:var(--good)">${bestCount?Math.round(bestSum/bestCount):"—"}</div><div class="l">Moyenne /20</div></div></div>`;root.appendChild(head);
  // 🎓 Maîtrise globale + objectif
  appendHTML(root,goalBannerHTML());
  const gms=masteryStats(null); const glv=masteryLevel(gms.mastery);
  const mcard=document.createElement("div");mcard.className="card";
  mcard.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center"><h3 style="margin:0">🎓 Niveau de maîtrise</h3><span style="font-weight:800;color:${glv.color}">${gms.mastery==null?"À évaluer":gms.mastery+"% · "+glv.name}</span></div>
   <div class="progress" style="margin-top:8px"><div style="width:${gms.mastery==null?0:gms.mastery}%"></div></div>
   <div class="muted small" style="margin-top:6px">Calcul : précision aux exercices${gms.avg!=null?` (${gms.acc}%)`:""} + niveau aux évaluations${gms.avg!=null?` (moyenne ${gms.avg}/20)`:""}. Fais des exercices et des évaluations pour l'affiner.</div>`;
  root.appendChild(mcard);
  // 🩺 Diagnostic des points faibles
  const weak=Object.values(data.notions||{}).filter(n=>n.seen>=2&&n.wrong>0).sort((a,b)=>(b.wrong/b.seen)-(a.wrong/a.seen)||b.wrong-a.wrong).slice(0,8);
  const wcard=document.createElement("div");wcard.className="card";
  if(!weak.length){
    wcard.innerHTML=`<h3 style="margin-top:0">🩺 Tes points faibles</h3><div class="muted small">Fais quelques exercices : l'app repère automatiquement les notions à retravailler et te propose un entraînement ciblé. 💪</div>`;
  }else{
    wcard.innerHTML=`<h3 style="margin-top:0">🩺 Points faibles — à retravailler en priorité</h3><div class="muted small" style="margin-bottom:8px">Du plus fragile au moins fragile. Clique pour t'entraîner uniquement dessus.</div>`;
    weak.forEach(n=>{const sub=SUBJECTS.find(s=>s.id===n.subject);const rate=Math.round(n.wrong/n.seen*100);
      const row=document.createElement("div");row.className="lessonrow";
      row.innerHTML=`<span style="font-size:1.3rem">${sub?sub.icon:"📌"}</span><div class="ln">${esc(n.notion)}<div class="lm">${sub?sub.name:""} · ${n.wrong}/${n.seen} erreurs (${rate}%)</div></div><span class="btn sm">🎯 S'entraîner</span>`;
      row.onclick=()=>startNotionPractice(n.notion,n.subject);wcard.appendChild(row);});
  }
  root.appendChild(wcard);
  SUBJECTS.forEach(s=>{
    const lessons=[];for(const l in CURRICULUM[s.id])CURRICULUM[s.id][l].forEach(les=>lessons.push({les,lvl:l}));
    if(!lessons.length)return;
    const done=lessons.filter(o=>{const p=data.prog[o.les.id];return p&&(p.best||p.done);}).length;
    const ms=masteryStats(s.id); const mlv=masteryLevel(ms.mastery);
    const card=document.createElement("div");card.className="card";
    card.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center"><h3 style="margin:0">${s.icon} ${s.name}</h3><span class="muted small">${done}/${lessons.length} leçons${ms.mastery!=null?` · <b style="color:${mlv.color}">${ms.mastery}% ${mlv.name}</b>`:""}</span></div><div class="progress" style="margin-top:8px"><div style="width:${Math.round(done/lessons.length*100)}%"></div></div>`;
    root.appendChild(card);
  });
}
function startNotionPractice(notion,subject){
  const pool=[];const C=CURRICULUM[subject]||{};
  for(const lv in C)C[lv].forEach(les=>les.exos.forEach((ex,i)=>{ if(ex.notion===notion && ex.t!=="open" && ex.t!=="dictee") pool.push({ex:ex,lesson:les,subject:subject,exoId:exoKey(les.id,i)}); }));
  if(!pool.length){toast("Pas d'exercice auto-corrigeable sur cette notion.");return;}
  curSubject=subject;data.settings.lastSubject=subject;save();renderSubjects();refreshPick();
  examMode="normal";
  examQ=shuffle(pool.slice());examIdx=0;examScore=0;examMax=examQ.length;
  startExamTimer(); show("exam");drawExam();
  toast("🎯 Entraînement ciblé : "+notion);
}

/* ============================ Vue Réglages ============================ */
function renderSettings(){
  const root=document.getElementById("view-settings");root.innerHTML="";
  const g=data.settings;
  const card=document.createElement("div");card.className="card";
  card.innerHTML=`<h2 style="margin-top:0">🧠 Correction par l'IA (Gemini)</h2>
   <div class="muted small" style="margin-bottom:10px">Pour faire corriger les <b>questions ouvertes</b> (rédactions, analyses) avec une vraie note /20 et des conseils. Gratuit via Google AI Studio. La clé reste enregistrée sur cet appareil uniquement.</div>
   <label>Clé API Gemini</label><input id="gkey" type="password" placeholder="Colle ta clé ici…" value="${esc(g.geminiKey||GEMINI_KEY_BUILTIN||"")}">${GEMINI_KEY_BUILTIN&&!(g.geminiKey||"").trim()?'<div class="small" style="color:var(--good);margin-top:4px">✓ Une clé est intégrée par défaut dans l\'application : l\'IA fonctionne sans configuration.</div>':""}
   <div class="row" style="margin-top:10px"><div><label>Modèle</label><input id="gmodel" placeholder="gemini-2.5-flash" value="${esc(g.geminiModel||"gemini-2.5-flash")}"></div>
   <div style="display:flex;align-items:flex-end;gap:8px"><button class="btn" id="gsave">💾 Enregistrer</button><button class="btn ghost" id="gtest">Tester</button></div></div>
   <div class="small" id="gstatus" style="margin-top:8px"></div>
   <div class="small muted" style="margin-top:8px">Obtenir une clé : <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">aistudio.google.com/app/apikey</a></div>`;
  root.appendChild(card);
  document.getElementById("gsave").onclick=()=>{data.settings.geminiKey=document.getElementById("gkey").value.trim();data.settings.geminiModel=(document.getElementById("gmodel").value.trim()||"gemini-2.5-flash");save();toast("Réglages IA enregistrés ✓");};
  document.getElementById("gtest").onclick=async()=>{const st=document.getElementById("gstatus");data.settings.geminiKey=document.getElementById("gkey").value.trim();data.settings.geminiModel=(document.getElementById("gmodel").value.trim()||"gemini-2.5-flash");save();st.textContent="Test en cours…";try{const r=await geminiGenerate('Réponds juste "OK" si tu me reçois.');st.style.color="var(--good)";st.textContent="✓ Connexion réussie : "+r.slice(0,40);}catch(e){st.style.color="var(--bad)";st.textContent="✗ "+(String(e.message)==="NO_KEY"?"Aucune clé saisie.":String(e.message));}};

  const exC=document.createElement("div");exC.className="card";
  exC.innerHTML=`<h3 style="margin-top:0">🎯 Mon objectif</h3><div class="muted small" style="margin-bottom:8px">Fixe-toi un cap : l'app affiche ta progression vers cet objectif (accueil + onglet Progrès) pour te motiver.</div>
   <label>Ce que je vise</label><select id="goalSel"><option value="">— Choisir un objectif —</option>${GOALS.map(g=>`<option value="${g.id}"${data.settings.goal===g.id?" selected":""}>${g.emoji} ${esc(g.label)}</option>`).join("")}</select>
   <div class="row" style="margin-top:10px"><div style="max-width:240px"><label>Date de mon examen</label><input type="date" id="examDate" value="${esc(data.settings.examDate||"")}"></div><div style="display:flex;align-items:flex-end"><button class="btn" id="examDateSave">💾 Enregistrer</button></div></div>`;
  root.appendChild(exC);
  document.getElementById("examDateSave").onclick=()=>{data.settings.examDate=document.getElementById("examDate").value||null;data.settings.goal=document.getElementById("goalSel").value||null;save();toast("Objectif enregistré ✓");};

  const data2=document.createElement("div");data2.className="card";
  data2.innerHTML=`<h3 style="margin-top:0">Vos données</h3><div class="muted small" style="margin-bottom:8px">La progression est enregistrée dans ce navigateur. Exportez une sauvegarde de temps en temps.</div>
   <div class="row"><button class="btn ghost" id="exp">⬇ Exporter</button><button class="btn ghost" id="imp">⬆ Importer</button><input type="file" id="impf" accept="application/json" class="hidden"><button class="btn bad" id="rst">🗑 Tout effacer</button></div>`;
  root.appendChild(data2);
  document.getElementById("exp").onclick=()=>{const b=new Blob([JSON.stringify(data)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="reviz-sauvegarde.json";a.click();toast("Sauvegarde exportée ✓");};
  document.getElementById("imp").onclick=()=>document.getElementById("impf").click();
  document.getElementById("impf").onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const o=JSON.parse(r.result);if(!o.settings)throw 0;data=o;save();toast("Sauvegarde importée ✓");updateHud();renderSettings();}catch(_){toast("Fichier invalide");}};r.readAsText(f);};
  document.getElementById("rst").onclick=()=>{if(confirm("Effacer TOUTE la progression ?")){data={settings:{theme:data.settings.theme,geminiKey:data.settings.geminiKey,geminiModel:data.settings.geminiModel,examDate:data.settings.examDate},prog:{},srs:{},exoSrs:{},notions:{},game:{xp:0,streak:0,todayDay:null,lastDay:null}};save();updateHud();toast("Tout a été effacé");renderSettings();}};
}

/* ============================ Thème & init ============================ */
function applyTheme(){const dark=data.settings.theme!=="light";document.documentElement.setAttribute("data-theme",dark?"dark":"light");document.getElementById("themeBtn").textContent=dark?"☀️":"🌙";}
document.getElementById("themeBtn").onclick=()=>{data.settings.theme=data.settings.theme==="light"?"dark":"light";save();applyTheme();};
function init(){
  if(!data.settings)data.settings={theme:"dark"};if(!data.prog)data.prog={};if(!data.srs)data.srs={};if(!data.exoSrs)data.exoSrs={};if(!data.notions)data.notions={};if(!data.game)data.game={xp:0,streak:0};
  ensureLevel();applyTheme();renderSubjects();refreshPick();updateHud();show("lessons");
}
init();
</script>
</body>
</html>
